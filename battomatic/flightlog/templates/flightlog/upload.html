{% extends "base.html" %}
{% load flightlog_tags %}

{% block content %}
<div class="container py-6">
    <h1 class="text-3xl font-bold mb-6">
        Flight log import
    </h1>

    <div class="card">
        <form
            id="flight-log-upload-form"
            method="post"
            action="{% url 'flightlog:preview' %}"
            enctype="multipart/form-data"
            hx-post="{% url 'flightlog:preview' %}"
            hx-target="#flight-log-preview"
            hx-swap="innerHTML"
            hx-encoding="multipart/form-data"
            hx-indicator="#flight-log-request-indicator"
            hx-disabled-elt="find button[type='submit']"
            class="mb-4"
        >
            {% csrf_token %}

            <label>
                <span class="label">
                    Cell Count
                </span>
                {{ form.cell_count }}
            </label>

            <label>
                <span class="label">
                    Chemistry
                </span>
                {{ form.chemistry }}
            </label>

            <label>
                <span class="label">
                    Files
                </span>
                {{ form.files }}
            </label>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Preview
                </button>

                <span id="flight-log-request-indicator" class="htmx-indicator" role="status" aria-live="polite">
                    Processing…
                </span>
            </div>
        </form>
    </div>
</div>
<div id="flight-log-preview" aria-live="polite">
    {% include "flightlog/_preview.html" %}
</div>


<script>
    document.body.addEventListener("htmx:beforeSwap", function (event) {
        if (event.detail.xhr.status === 400) {
            event.detail.shouldSwap = true;
            event.detail.isError = false;
        }
    });
</script>
{% endblock %}
