{% extends "base.html" %}

{% block content %}
<div class="container py-6">
    <h1 class="text-3xl font-bold mb-6">Flight log import</h1>

    <div class="card">
        <form method="post" enctype="multipart/form-data" class="mb-4">
        {% csrf_token %}
            <label>
                <span class="label">Cell Count</span>
                {{ form.cell_count}}
            </label>
            <label>
                <span class="label">Chemistry</span>
                {{ form.chemistry}}
            </label>
            <label>
                <span class="label">Files</span>
                {{ form.files }}
            </label>

            <div class="mt-3">

                <button
                    type="submit"
                    name="action"
                    value="preview"
                    class="btn btn-primary"
                >
                    Preview
                </button>

                {% if preview and preview.is_valid %}

                    <button
                        type="submit"
                        name="action"
                        value="save"
                        class="btn btn-success"
                    >
                        Save to database
                    </button>

                {% endif %}

            </div>
            
        </form>        
        </div>
            <div id="flight-log-preview">
            {% include "flightlog/_preview.html" %}
        </div>
</div>


{% endblock %}
