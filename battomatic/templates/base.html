{% load static %}

<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Batt-o-matic</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="stylesheet"
        href="{% static 'css/battomatic.css' %}"
    >

    <link
        rel="icon"
        type="image/png"
        href="{% static 'favicon.png' %}"
    >

    <script
        src="https://unpkg.com/htmx.org@2.0.8"
        crossorigin="anonymous"
    ></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                     
            <a
                href="{% url 'battery_list' %}"
                class="text-xl font-bold tracking-tight"
            >
                Batt-o-matic
            </a>

            <div class="flex items-center gap-4 text-sm">

                <a
                    class="nav-link"
                    href="{% url 'flightlog:session-list' %}"
                >

                    Flight Logs
                </a>                
                <a
                    class="nav-link"
                    href="{% url 'battery_list' %}"
                >
                    Batteries
                </a>

                <a
                    class="nav-link"
                    href="{% url 'charge_event_list' %}"
                >
                    Charge Events
                </a>

                <a
                    class="nav-link"
                    href="{% url 'voltage_chart' %}"
                >
                    Voltage Chart
                </a>

                {% if user.is_authenticated %}

                    <a
                        class="nav-link"
                        href="/admin/" target="_blank"
                    >
                        Admin
                    </a>

                    <form
                        action="{% url 'logout' %}"
                        method="post"
                        class="inline"
                    >
                        {% csrf_token %}

                        <button
                            type="submit"
                            class="nav-link"
                        >
                            Logout
                        </button>
                    </form>

                {% else %}

                    <a
                        class="nav-link"
                        href="{% url 'login' %}"
                    >
                        Login
                    </a>

                {% endif %}

            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">

        {% if messages %}
            <div class="space-y-3 mb-6">
                {% for message in messages %}
                    <div class="rounded-xl border border-amber-500/50 bg-amber-500/10 px-4 py-3 text-amber-100">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}

    </main>

</body>
</html>
