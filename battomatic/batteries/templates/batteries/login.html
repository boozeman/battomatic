{% extends 'base.html' %}
{% block content %}

<h1 class="text-3xl font-bold mb-6">Login</h1>

<form method="post" class="card mb-6 flex flex-col gap-4 sm:flex-row sm:items-end">
    {% csrf_token %}{{ form.non_field_errors }}
    <label class="w-full"><span class="label">Username</span>{{ form.username }}</label>
    <label class="w-full"><span class="label">Password</span>{{ form.password }}</label>
    <button class="btn w-full sm:w-auto">Login</button>
</form>

{% endblock %}
